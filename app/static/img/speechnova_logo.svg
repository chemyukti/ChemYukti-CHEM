<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A8FE3"/>
      <stop offset="100%" style="stop-color:#0A4F8A"/>
    </linearGradient>

    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00BFFF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00BFFF;stop-opacity:0"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="globeClip">
      <circle cx="200" cy="190" r="90"/>
    </clipPath>
  </defs>

  <!-- White Background -->
  <rect width="400" height="400" rx="80" fill="#FFFFFF"/>

  <!-- Ambient glow -->
  <circle cx="200" cy="190" r="120" fill="url(#glowCenter)"/>

  <!-- Globe -->
  <g filter="url(#glow)">
    <circle cx="200" cy="190" r="90" fill="url(#globeGrad)" opacity="0.9"/>

    <!-- Latitude lines -->
    <g clip-path="url(#globeClip)" fill="none" stroke="#5BBFFF" stroke-width="1" opacity="0.3">
      <ellipse cx="200" cy="190" rx="90" ry="25"/>
      <ellipse cx="200" cy="190" rx="90" ry="50"/>
      <ellipse cx="200" cy="190" rx="90" ry="70"/>
      <ellipse cx="200" cy="190" rx="40" ry="90"/>
      <ellipse cx="200" cy="190" rx="65" ry="90"/>
    </g>

    <circle cx="200" cy="190" r="90" fill="none" stroke="#00BFFF" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Sound Waves -->
  <g filter="url(#glow)" opacity="0.8">
    <path d="M95,170 Q75,190 95,210" fill="none" stroke="#00E5FF" stroke-width="3" stroke-linecap="round"/>
    <path d="M75,150 Q45,190 75,230" fill="none" stroke="#00BFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <g filter="url(#glow)" opacity="0.8">
    <path d="M305,170 Q325,190 305,210" fill="none" stroke="#00E5FF" stroke-width="3" stroke-linecap="round"/>
    <path d="M325,150 Q355,190 325,230" fill="none" stroke="#00BFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Microphone -->
  <g filter="url(#strongGlow)">
    <rect x="186" y="156" width="28" height="46" rx="14" fill="#00E5FF"/>

    <line x1="193" y1="170" x2="207" y2="170" stroke="#0A4F8A" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="193" y1="178" x2="207" y2="178" stroke="#0A4F8A" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

    <path d="M174,200 Q174,230 200,230 Q226,230 226,200" fill="none" stroke="#00E5FF" stroke-width="3" stroke-linecap="round"/>
    <line x1="200" y1="230" x2="200" y2="245" stroke="#00E5FF" stroke-width="3" stroke-linecap="round"/>
    <line x1="188" y1="245" x2="212" y2="245" stroke="#00E5FF" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>